<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      color: #1b2b34;
      background:
        radial-gradient(circle at top left, rgba(74, 163, 175, 0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(74, 163, 175, 0.25), transparent 28%),
        linear-gradient(135deg, #d9edf0 0%, #f4f2fa 48%, #d7eef1 100%);
    }

    .page-shell {
      max-width: 1280px;
      margin: 24px auto;
      padding: 0 20px 24px;
    }

    .topbar {
      min-height: 110px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 10px 30px rgba(40, 70, 90, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .logo-box {
      min-width: 280px;
      max-width: 320px;
      min-height: 72px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 8px 22px rgba(50, 80, 100, 0.08);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
    }

    .logo-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, #48a8b3, #2f7f8b);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .logo-text {
      line-height: 1.15;
    }

    .logo-title {
      font-size: 16px;
      font-weight: 800;
      color: #2a6f79;
      letter-spacing: 0.2px;
    }

    .logo-subtitle {
      font-size: 13px;
      color: #445b66;
      margin-top: 4px;
      font-weight: 700;
    }

    .lang-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 18px rgba(50, 80, 100, 0.08);
    }

    .lang-btn {
      min-width: 68px;
      height: 44px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #55707a;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .lang-btn.active {
      background: linear-gradient(135deg, #1b97a5, #147886);
      color: #fff;
      box-shadow: 0 4px 12px rgba(20, 120, 134, 0.28);
    }

    .login-section {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 190px);
    }

    .login-card {
      width: 100%;
      max-width: 820px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.34);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 14px 34px rgba(43, 69, 88, 0.1);
      padding: 40px 44px 34px;
    }

    .title {
      font-size: 60px;
      font-weight: 800;
      color: #233746;
      margin-bottom: 28px;
      text-align: center;
    }

    .message-box {
      display: none;
      margin-bottom: 20px;
      padding: 15px 18px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .message-box.show {
      display: block;
    }

    .message-box.success {
      background: rgba(232, 248, 236, 0.9);
      color: #176b2c;
      border-color: #9bd3a6;
    }

    .message-box.error {
      background: rgba(255, 240, 240, 0.92);
      color: #b42318;
      border-color: #f0b4b4;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 9px;
      color: #314a56;
    }

    .input {
      width: 100%;
      height: 58px;
      border: 1px solid rgba(72, 104, 117, 0.18);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.45);
      padding: 0 20px;
      font-size: 18px;
      color: #27414d;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input:focus {
      border-color: #0c6771;
      box-shadow: 0 0 0 3px rgba(12, 103, 113, 0.12);
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0 24px;
      color: #415a66;
      font-size: 17px;
      font-weight: 600;
    }

    .remember-row input {
      width: 20px;
      height: 20px;
      accent-color: #0c6771;
    }

    .captcha-wrap {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
    }

    .btn {
      width: 100%;
      height: 58px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #1693a2, #0d6c78);
      color: white;
      font-size: 28px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(16, 110, 121, 0.22);
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.72;
      cursor: not-allowed;
      transform: none;
    }

    .small-link-wrap {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .small-link {
      min-width: 320px;
      text-align: center;
      background: rgba(255, 255, 255, 0.74);
      color: #24404b;
      border: 1px solid rgba(53, 89, 99, 0.18);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(40, 70, 90, 0.05);
    }

    .small-link a {
      color: #0c6771;
      text-decoration: none;
      font-weight: 800;
    }

    body.rtl {
      direction: rtl;
    }

    body.rtl .topbar {
      flex-direction: row-reverse;
    }

    body.rtl .logo-box {
      flex-direction: row-reverse;
    }

    body.rtl .logo-text {
      text-align: right;
    }

    body.rtl .remember-row {
      flex-direction: row-reverse;
      justify-content: flex-end;
    }

    @media (max-width: 900px) {
      .page-shell {
        padding: 0 12px 18px;
      }

      .topbar {
        padding: 18px 16px;
        gap: 14px;
        flex-direction: column;
        align-items: stretch;
      }

      body.rtl .topbar {
        flex-direction: column;
      }

      .logo-box {
        min-width: unset;
        width: 100%;
      }

      .lang-toggle {
        align-self: flex-end;
      }

      .login-card {
        padding: 28px 20px 24px;
      }

      .title {
        font-size: 42px;
      }

      .small-link {
        min-width: unset;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="topbar">
      <div class="logo-box">
        <div class="logo-icon">🦷</div>
        <div class="logo-text">
          <div class="logo-title" id="logoTitle">SoftwareDoctors</div>
          <div class="logo-subtitle" id="logoSubtitle">Dental Clinic Management System</div>
        </div>
      </div>

      <div class="lang-toggle">
        <button class="lang-btn active" id="enBtn" type="button">EN</button>
        <button class="lang-btn" id="arBtn" type="button">AR</button>
      </div>
    </div>

    <section class="login-section">
      <div class="login-card">
        <h1 class="title" id="pageTitle">Login</h1>

        <div id="messageBox" class="message-box"></div>

        <form id="loginForm">
          <div class="field">
            <label for="email" id="emailLabel">Email</label>
            <input class="input" type="email" id="email" placeholder="Enter your email" required />
          </div>

          <div class="field">
            <label for="password" id="passwordLabel">Password</label>
            <input class="input" type="password" id="password" placeholder="Enter your password" required />
          </div>

          <label class="remember-row">
            <input type="checkbox" id="rememberMe" />
            <span id="rememberText">Remember Me</span>
          </label>

          <div class="captcha-wrap">
            <div class="g-recaptcha" data-sitekey="6LdIJK0sAAAAACmKKxnnh6is_xftOQNP1LdDFWj-"></div>
          </div>

          <button class="btn" id="loginBtn" type="submit">Login</button>
        </form>

        <div class="small-link-wrap">
          <div class="small-link">
            <span id="forgotText">Forgot password?</span>
          </div>

          <div class="small-link">
            <span id="registerText">Don't have an account?</span>
            <a href="register.html" id="registerLinkText">Register</a>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://dental-clinic-management-system-wgmv.onrender.com";
    const form = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const messageBox = document.getElementById("messageBox");
    const enBtn = document.getElementById("enBtn");
    const arBtn = document.getElementById("arBtn");
    const rememberMe = document.getElementById("rememberMe");
    const emailInput = document.getElementById("email");

    const content = {
      en: {
        htmlLang: "en",
        dir: "ltr",
        title: "Login",
        logoTitle: "SoftwareDoctors",
        logoSubtitle: "Dental Clinic Management System",
        pageTitle: "Login",
        emailLabel: "Email",
        emailPlaceholder: "Enter your email",
        passwordLabel: "Password",
        passwordPlaceholder: "Enter your password",
        rememberText: "Remember Me",
        loginBtn: "Login",
        loggingIn: "Logging in...",
        forgotText: "Forgot password?",
        registerText: "Don't have an account?",
        registerLinkText: "Register",
        loginFailed: "Invalid login",
        connectionError: "Error connecting to server",
        captchaRequired: "Please verify you are not a robot"
      },
      ar: {
        htmlLang: "ar",
        dir: "rtl",
        title: "تسجيل الدخول",
        logoTitle: "SoftwareDoctors",
        logoSubtitle: "نظام إدارة عيادة الأسنان",
        pageTitle: "تسجيل الدخول",
        emailLabel: "البريد الإلكتروني",
        emailPlaceholder: "أدخل بريدك الإلكتروني",
        passwordLabel: "كلمة المرور",
        passwordPlaceholder: "أدخل كلمة المرور",
        rememberText: "تذكرني",
        loginBtn: "دخول",
        loggingIn: "جاري الدخول...",
        forgotText: "هل نسيت كلمة المرور؟",
        registerText: "ليس لديك حساب؟",
        registerLinkText: "سجل الآن",
        loginFailed: "بيانات الدخول غير صحيحة",
        connectionError: "تعذر الاتصال بالخادم",
        captchaRequired: "يرجى التحقق أنك لست روبوتًا"
      }
    };

    function showMessage(message, type = "error") {
      messageBox.textContent = message;
      messageBox.className = `message-box show ${type}`;
    }

    function clearMessage() {
      messageBox.textContent = "";
      messageBox.className = "message-box";
    }

    function applyLanguage(lang) {
      const selected = content[lang];

      document.documentElement.lang = selected.htmlLang;
      document.documentElement.dir = selected.dir;
      document.body.classList.toggle("rtl", lang === "ar");
      document.title = selected.title;

      document.getElementById("logoTitle").textContent = selected.logoTitle;
      document.getElementById("logoSubtitle").textContent = selected.logoSubtitle;
      document.getElementById("pageTitle").textContent = selected.pageTitle;
      document.getElementById("emailLabel").textContent = selected.emailLabel;
      emailInput.placeholder = selected.emailPlaceholder;
      document.getElementById("passwordLabel").textContent = selected.passwordLabel;
      document.getElementById("password").placeholder = selected.passwordPlaceholder;
      document.getElementById("rememberText").textContent = selected.rememberText;
      loginBtn.textContent = selected.loginBtn;
      document.getElementById("forgotText").textContent = selected.forgotText;
      document.getElementById("registerText").textContent = selected.registerText + " ";
      document.getElementById("registerLinkText").textContent = selected.registerLinkText;

      enBtn.classList.toggle("active", lang === "en");
      arBtn.classList.toggle("active", lang === "ar");

      localStorage.setItem("siteLanguage", lang);
    }

    function loadRememberedEmail() {
      const savedEmail = localStorage.getItem("rememberedEmail");
      if (savedEmail) {
        emailInput.value = savedEmail;
        rememberMe.checked = true;
      }
    }

    function handleRememberMe(email) {
      if (rememberMe.checked) {
        localStorage.setItem("rememberedEmail", email);
      } else {
        localStorage.removeItem("rememberedEmail");
      }
    }

    enBtn.addEventListener("click", () => applyLanguage("en"));
    arBtn.addEventListener("click", () => applyLanguage("ar"));

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      clearMessage();

      const email = emailInput.value.trim();
      const password = document.getElementById("password").value;
      const currentLang = localStorage.getItem("siteLanguage") || "en";
      const captcha = grecaptcha.getResponse();

      if (!captcha) {
        showMessage(content[currentLang].captchaRequired, "error");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = content[currentLang].loggingIn;

      try {
        const response = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password, captcha })
        });

        const data = await response.json();

        if (data.success) {
          handleRememberMe(email);
          localStorage.setItem("loggedInUser", JSON.stringify(data.user));
          window.location.href = "appointment.html";
        } else {
          showMessage(data.message || content[currentLang].loginFailed, "error");
          grecaptcha.reset();
        }
      } catch (error) {
        console.error("Login error:", error);
        showMessage(content[currentLang].connectionError, "error");
        grecaptcha.reset();
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = content[currentLang].loginBtn;
      }
    });

    const savedLanguage = localStorage.getItem("siteLanguage") || "en";
    applyLanguage(savedLanguage);
    loadRememberedEmail();
  </script>
</body>
</html>

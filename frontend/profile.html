<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      color: #1b2b34;
      background:
        radial-gradient(circle at top left, rgba(74, 163, 175, 0.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(74, 163, 175, 0.18), transparent 24%),
        linear-gradient(135deg, #d9edf0 0%, #f4f2fa 48%, #d7eef1 100%);
    }

    .page-shell {
      max-width: 1380px;
      margin: 24px auto;
      padding: 0 20px 24px;
    }

    .topbar {
      min-height: 110px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 10px 30px rgba(40, 70, 90, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      margin-bottom: 24px;
      gap: 16px;
    }

    .logo-box {
      min-width: 280px;
      max-width: 330px;
      min-height: 72px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 8px 22px rgba(50, 80, 100, 0.08);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
    }

    .logo-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, #48a8b3, #2f7f8b);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .logo-text {
      line-height: 1.15;
    }

    .logo-title {
      font-size: 16px;
      font-weight: 800;
      color: #2a6f79;
    }

    .logo-subtitle {
      font-size: 13px;
      color: #445b66;
      margin-top: 4px;
      font-weight: 700;
    }

    .page-title {
      font-size: 40px;
      font-weight: 800;
      color: #233746;
      text-align: center;
      flex: 1;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .user-box {
      min-width: 150px;
      text-align: right;
      font-size: 18px;
      font-weight: 700;
      color: #35515d;
    }

    .lang-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 18px rgba(50, 80, 100, 0.08);
    }

    .lang-btn {
      min-width: 62px;
      height: 42px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #55707a;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .lang-btn.active {
      background: linear-gradient(135deg, #1b97a5, #147886);
      color: #fff;
      box-shadow: 0 4px 12px rgba(20, 120, 134, 0.28);
    }

    .layout {
      display: flex;
      gap: 22px;
      min-height: calc(100vh - 180px);
    }

    .sidebar {
      width: 250px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.34);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 14px 34px rgba(43, 69, 88, 0.08);
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .menu,
    .bottom-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .divider {
      height: 1px;
      background: rgba(86, 108, 117, 0.18);
      margin: 8px 6px;
      border: none;
    }

    .nav-link {
      display: block;
      text-decoration: none;
      color: #314b56;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .nav-link:hover {
      background: rgba(221, 236, 237, 0.85);
      transform: translateX(2px);
    }

    .nav-link.active {
      background: linear-gradient(135deg, rgba(27, 151, 165, 0.18), rgba(20, 120, 134, 0.12));
      color: #155c66;
      box-shadow: inset 0 0 0 1px rgba(27, 151, 165, 0.14);
    }

    .content {
      flex: 1;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.34);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 14px 34px rgba(43, 69, 88, 0.08);
      padding: 30px 28px;
    }

    .section-title {
      font-size: 30px;
      font-weight: 800;
      color: #233746;
      margin-bottom: 18px;
    }

    .message-box {
      display: none;
      margin-bottom: 18px;
      padding: 15px 18px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .message-box.show {
      display: block;
    }

    .message-box.success {
      background: rgba(232, 248, 236, 0.9);
      color: #176b2c;
      border-color: #9bd3a6;
    }

    .message-box.error {
      background: rgba(255, 240, 240, 0.92);
      color: #b42318;
      border-color: #f0b4b4;
    }

    .profile-card {
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.48);
      box-shadow: 0 10px 24px rgba(40, 70, 90, 0.05);
      padding: 26px;
      display: flex;
      gap: 32px;
      align-items: flex-start;
    }

    .avatar-side {
      width: 190px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding-top: 4px;
    }

    .avatar-circle {
      width: 126px;
      height: 126px;
      border: 1px solid rgba(72, 104, 117, 0.18);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 8px 18px rgba(40, 70, 90, 0.05);
      overflow: hidden;
    }

    .avatar-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .upload-btn {
      border: 1px solid rgba(72, 104, 117, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 700;
      color: #314b56;
    }

    .form-side {
      flex: 1;
      max-width: 720px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #314a56;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid rgba(72, 104, 117, 0.18);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.8);
      padding: 0 16px;
      font-size: 16px;
      color: #27414d;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: #0c6771;
      box-shadow: 0 0 0 3px rgba(12, 103, 113, 0.12);
    }

    .field input {
      height: 50px;
    }

    .field textarea {
      height: 100px;
      padding: 14px 16px;
      resize: none;
    }

    .save-btn {
      margin-top: 8px;
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #1693a2, #0d6c78);
      color: white;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(16, 110, 121, 0.18);
      transition: 0.2s ease;
    }

    .save-btn:hover {
      transform: translateY(-1px);
    }

    .save-btn:disabled {
      opacity: 0.72;
      cursor: not-allowed;
      transform: none;
    }

    body.rtl {
      direction: rtl;
    }

    body.rtl .topbar {
      flex-direction: row-reverse;
    }

    body.rtl .logo-box {
      flex-direction: row-reverse;
    }

    body.rtl .logo-text {
      text-align: right;
    }

    body.rtl .header-right {
      flex-direction: row-reverse;
    }

    body.rtl .user-box {
      text-align: left;
    }

    body.rtl .field label {
      text-align: right;
    }

    body.rtl .field input,
    body.rtl .field textarea {
      text-align: right;
    }

    body.rtl .section-title {
      text-align: right;
    }

    body.rtl .nav-link:hover {
      transform: translateX(-2px);
    }

    @media (max-width: 930px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .profile-card {
        flex-direction: column;
        align-items: center;
      }

      .form-side {
        width: 100%;
        max-width: 100%;
      }
    }

    @media (max-width: 760px) {
      .page-shell {
        padding: 0 12px 18px;
      }

      .topbar {
        padding: 18px 16px;
        gap: 14px;
        flex-direction: column;
        align-items: stretch;
      }

      body.rtl .topbar {
        flex-direction: column;
      }

      .logo-box {
        min-width: unset;
        width: 100%;
      }

      .header-right {
        justify-content: space-between;
      }

      .page-title {
        font-size: 30px;
      }

      .content {
        padding: 22px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="topbar">
      <div class="logo-box">
        <div class="logo-icon">🦷</div>
        <div class="logo-text">
          <div class="logo-title" id="logoTitle">SoftwareDoctors</div>
          <div class="logo-subtitle" id="logoSubtitle">Dental Clinic Management System</div>
        </div>
      </div>

      <div class="page-title" id="pageTitle">Profile</div>

      <div class="header-right">
        <div class="user-box" id="userNameBox">User</div>

        <div class="lang-toggle">
          <button class="lang-btn active" id="enBtn" type="button">EN</button>
          <button class="lang-btn" id="arBtn" type="button">AR</button>
        </div>
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div class="menu">
          <a class="nav-link" href="dashboard.html" id="navDashboard">☷ Dashboard</a>
          <hr class="divider">
          <a class="nav-link" href="appointment.html" id="navAppointment">🗓 Booking Appointment</a>
          <a class="nav-link" href="prescriptions.html" id="navPrescriptions">💊 Prescriptions</a>
          <a class="nav-link active" href="profile.html" id="navProfile">👤 Profile</a>
        </div>

        <div class="bottom-links">
          <hr class="divider">
          <a class="nav-link" href="help-support.html" id="navHelp">❓ Help & Support</a>
          <a class="nav-link" href="#" id="logoutBtn">⇦ Logout</a>
        </div>
      </aside>

      <main class="content">
        <h2 class="section-title" id="sectionTitle">My Profile</h2>

        <div id="messageBox" class="message-box"></div>

        <div class="profile-card">
          <div class="avatar-side">
            <div class="avatar-circle" id="avatarCircle">👤</div>
            <input type="file" id="photoInput" accept="image/*" hidden />
            <button class="upload-btn" type="button" id="uploadBtn">📷 Upload Photo</button>
          </div>

          <div class="form-side">
            <form id="profileForm">
              <div class="field">
                <label for="fullName" id="fullNameLabel">Full Name</label>
                <input type="text" id="fullName" required />
              </div>

              <div class="field">
                <label for="email" id="emailLabel">Email</label>
                <input type="email" id="email" readonly />
              </div>

              <div class="field">
                <label for="phone" id="phoneLabel">Phone</label>
                <input type="text" id="phone" />
              </div>

              <div class="field">
                <label for="birthDate" id="birthDateLabel">Date of Birth</label>
                <input type="date" id="birthDate" />
              </div>

              <div class="field">
                <label for="address" id="addressLabel">Address</label>
                <input type="text" id="address" />
              </div>

              <div class="field">
                <label for="emergencyContact" id="emergencyContactLabel">Emergency Contact</label>
                <input type="text" id="emergencyContact" />
              </div>

              <div class="field">
                <label for="medicalNotes" id="medicalNotesLabel">Medical Notes</label>
                <textarea id="medicalNotes"></textarea>
              </div>

              <button class="save-btn" type="submit" id="saveBtn">Save Changes</button>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
    const API_URL = "https://dental-clinic-management-system-wgmv.onrender.com";

    if (!loggedInUser) {
      window.location.href = "login.html";
    }

    const userNameBox = document.getElementById("userNameBox");
    const logoutBtn = document.getElementById("logoutBtn");
    const profileForm = document.getElementById("profileForm");
    const messageBox = document.getElementById("messageBox");
    const saveBtn = document.getElementById("saveBtn");
    const enBtn = document.getElementById("enBtn");
    const arBtn = document.getElementById("arBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const photoInput = document.getElementById("photoInput");
    const avatarCircle = document.getElementById("avatarCircle");

    const fullNameInput = document.getElementById("fullName");
    const emailInput = document.getElementById("email");
    const phoneInput = document.getElementById("phone");
    const birthDateInput = document.getElementById("birthDate");
    const addressInput = document.getElementById("address");
    const emergencyContactInput = document.getElementById("emergencyContact");
    const medicalNotesInput = document.getElementById("medicalNotes");

    const content = {
      en: {
        htmlLang: "en",
        dir: "ltr",
        title: "Profile",
        logoTitle: "SoftwareDoctors",
        logoSubtitle: "Dental Clinic Management System",
        pageTitle: "Profile",
        navDashboard: "☷ Dashboard",
        navAppointment: "🗓 Booking Appointment",
        navPrescriptions: "💊 Prescriptions",
        navProfile: "👤 Profile",
        navHelp: "❓ Help & Support",
        navLogout: "⇦ Logout",
        sectionTitle: "My Profile",
        uploadBtn: "📷 Upload Photo",
        fullNameLabel: "Full Name",
        emailLabel: "Email",
        phoneLabel: "Phone",
        birthDateLabel: "Date of Birth",
        addressLabel: "Address",
        emergencyContactLabel: "Emergency Contact",
        medicalNotesLabel: "Medical Notes",
        saveBtn: "Save Changes",
        loadingText: "Saving...",
        successMessage: "Profile updated successfully",
        updateFailed: "Update failed",
        serverError: "Server error",
        loadFailed: "Failed to load profile",
        noFileSelected: "Please choose an image",
        invalidImageType: "Please choose a valid image file",
        imageTooLarge: "Image size must be less than 2 MB",
        photoUpdated: "Photo updated successfully"
      },
      ar: {
        htmlLang: "ar",
        dir: "rtl",
        title: "الملف الشخصي",
        logoTitle: "SoftwareDoctors",
        logoSubtitle: "نظام إدارة عيادة الأسنان",
        pageTitle: "الملف الشخصي",
        navDashboard: "☷ لوحة التحكم",
        navAppointment: "🗓 حجز موعد",
        navPrescriptions: "💊 الوصفات الطبية",
        navProfile: "👤 الملف الشخصي",
        navHelp: "❓ المساعدة والدعم",
        navLogout: "⇦ تسجيل الخروج",
        sectionTitle: "ملفي الشخصي",
        uploadBtn: "📷 رفع صورة",
        fullNameLabel: "الاسم الكامل",
        emailLabel: "البريد الإلكتروني",
        phoneLabel: "رقم الهاتف",
        birthDateLabel: "تاريخ الميلاد",
        addressLabel: "العنوان",
        emergencyContactLabel: "جهة اتصال للطوارئ",
        medicalNotesLabel: "ملاحظات طبية",
        saveBtn: "حفظ التغييرات",
        loadingText: "جاري الحفظ...",
        successMessage: "تم تحديث الملف الشخصي بنجاح",
        updateFailed: "فشل التحديث",
        serverError: "خطأ في الخادم",
        loadFailed: "فشل في تحميل الملف الشخصي",
        noFileSelected: "الرجاء اختيار صورة",
        invalidImageType: "الرجاء اختيار ملف صورة صحيح",
        imageTooLarge: "حجم الصورة يجب أن يكون أقل من 2 ميجابايت",
        photoUpdated: "تم تحديث الصورة بنجاح"
      }
    };

    function showMessage(message, type = "error") {
      messageBox.textContent = message;
      messageBox.className = `message-box show ${type}`;
    }

    function clearMessage() {
      messageBox.textContent = "";
      messageBox.className = "message-box";
    }

    function applyLanguage(lang) {
      const selected = content[lang];
      const currentUser = JSON.parse(localStorage.getItem("loggedInUser")) || loggedInUser;

      document.documentElement.lang = selected.htmlLang;
      document.documentElement.dir = selected.dir;
      document.body.classList.toggle("rtl", lang === "ar");
      document.title = selected.title;

      document.getElementById("logoTitle").textContent = selected.logoTitle;
      document.getElementById("logoSubtitle").textContent = selected.logoSubtitle;
      document.getElementById("pageTitle").textContent = selected.pageTitle;
      document.getElementById("navDashboard").textContent = selected.navDashboard;
      document.getElementById("navAppointment").textContent = selected.navAppointment;
      document.getElementById("navPrescriptions").textContent = selected.navPrescriptions;
      document.getElementById("navProfile").textContent = selected.navProfile;
      document.getElementById("navHelp").textContent = selected.navHelp;
      document.getElementById("logoutBtn").textContent = selected.navLogout;
      document.getElementById("sectionTitle").textContent = selected.sectionTitle;
      document.getElementById("uploadBtn").textContent = selected.uploadBtn;
      document.getElementById("fullNameLabel").textContent = selected.fullNameLabel;
      document.getElementById("emailLabel").textContent = selected.emailLabel;
      document.getElementById("phoneLabel").textContent = selected.phoneLabel;
      document.getElementById("birthDateLabel").textContent = selected.birthDateLabel;
      document.getElementById("addressLabel").textContent = selected.addressLabel;
      document.getElementById("emergencyContactLabel").textContent = selected.emergencyContactLabel;
      document.getElementById("medicalNotesLabel").textContent = selected.medicalNotesLabel;

      saveBtn.textContent = selected.saveBtn;
      userNameBox.textContent = currentUser.full_name || "Patient";

      enBtn.classList.toggle("active", lang === "en");
      arBtn.classList.toggle("active", lang === "ar");

      localStorage.setItem("siteLanguage", lang);
    }

    async function loadProfile() {
      try {
        const res = await fetch(`${API_URL}/my-patient/${loggedInUser.user_id}`);
        const data = await res.json();

        if (!data.success) {
          throw new Error("Failed to load profile");
        }

        const currentUser = JSON.parse(localStorage.getItem("loggedInUser")) || loggedInUser;

        fullNameInput.value = currentUser.full_name || "";
        emailInput.value = currentUser.email || "";
        phoneInput.value = data.patient.phone || "";
        birthDateInput.value = data.patient.birth_date ? data.patient.birth_date.split("T")[0] : "";
        addressInput.value = data.patient.address || "";
        emergencyContactInput.value = data.patient.emergency_contact || "";
        medicalNotesInput.value = data.patient.medical_notes || "";

        if (data.patient.profile_image) {
          avatarCircle.innerHTML = `<img src="${data.patient.profile_image}" alt="Profile Photo">`;
        } else {
          avatarCircle.textContent = "👤";
        }
      } catch (err) {
        console.error("Load profile error:", err);
        showMessage(content[localStorage.getItem("siteLanguage") || "en"].loadFailed, "error");
      }
    }

    async function handlePhotoUpload(file) {
      const lang = localStorage.getItem("siteLanguage") || "en";

      if (!file) {
        showMessage(content[lang].noFileSelected, "error");
        return;
      }

      if (!file.type.startsWith("image/")) {
        showMessage(content[lang].invalidImageType, "error");
        return;
      }

      if (file.size > 2 * 1024 * 1024) {
        showMessage(content[lang].imageTooLarge, "error");
        return;
      }

      const reader = new FileReader();

      reader.onload = async (e) => {
        const image = e.target.result;

        avatarCircle.innerHTML = `<img src="${image}" alt="Profile Photo">`;

        try {
          const res = await fetch(`${API_URL}/profile-image/${loggedInUser.user_id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ profile_image: image })
          });

          const data = await res.json();

          if (data.success) {
            showMessage(content[lang].photoUpdated, "success");
          } else {
            showMessage(data.message || content[lang].updateFailed, "error");
          }
        } catch (error) {
          console.error("Photo upload error:", error);
          showMessage(content[lang].serverError, "error");
        }
      };

      reader.readAsDataURL(file);
    }

    profileForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();

      const lang = localStorage.getItem("siteLanguage") || "en";

      saveBtn.disabled = true;
      saveBtn.textContent = content[lang].loadingText;

      try {
        const res = await fetch(`${API_URL}/profile/${loggedInUser.user_id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            full_name: fullNameInput.value.trim(),
            phone: phoneInput.value.trim(),
            birth_date: birthDateInput.value || null,
            address: addressInput.value.trim(),
            emergency_contact: emergencyContactInput.value.trim(),
            medical_notes: medicalNotesInput.value.trim()
          })
        });

        const data = await res.json();

        if (data.success) {
          const currentUser = JSON.parse(localStorage.getItem("loggedInUser")) || loggedInUser;
          const updatedUser = {
            ...currentUser,
            full_name: fullNameInput.value.trim()
          };

          localStorage.setItem("loggedInUser", JSON.stringify(updatedUser));
          userNameBox.textContent = fullNameInput.value.trim();
          showMessage(content[lang].successMessage, "success");
        } else {
          showMessage(data.message || content[lang].updateFailed, "error");
        }
      } catch (error) {
        console.error("Profile update error:", error);
        showMessage(content[lang].serverError, "error");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = content[lang].saveBtn;
      }
    });

    uploadBtn.onclick = () => photoInput.click();
    photoInput.onchange = () => handlePhotoUpload(photoInput.files[0]);

    logoutBtn.onclick = (e) => {
      e.preventDefault();
      localStorage.removeItem("loggedInUser");
      window.location.href = "home.html";
    };

    enBtn.onclick = () => applyLanguage("en");
    arBtn.onclick = () => applyLanguage("ar");

    const lang = localStorage.getItem("siteLanguage") || "en";
    applyLanguage(lang);
    loadProfile();
  </script>
</body>
</html>
